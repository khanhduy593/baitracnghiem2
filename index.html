<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Ôn Thi Toán Lớp 3 - KhanhDuy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="startScreen" class="start-screen">
        <div class="glass-card">
            <h1>BÀI ÔN TRẮC NGHIỆM TOÁN</h1>
            <p class="author">Thiết kế bởi: <span>KhanhDuy & Gemini</span></p>
            <button onclick="startQuiz()" id="startBtn">🚀 Bắt đầu ôn tập</button>
        </div>
    </div>

    <div class="container" id="quizApp" style="display:none;">
        <div class="sidebar" id="sidebar"></div>

        <div class="main-content">
            <div class="quiz-header">
                <div class="progress-wrapper">
                    <div class="progress">
                        <div id="progressBar"></div>
                    </div>
                    <span id="progressText">0/10</span>
                </div>
            </div>

            <div class="quiz-card" id="quizCard">
                <div id="resultBox" class="result-box" style="display: none;">
                    <h2 id="resultScore">Điểm của bạn: 0/10</h2>
                    <p id="resultFeedback"></p>
                    <button onclick="resetQuiz()" class="retry-btn">🔄 Làm lại đề khác</button>
                </div>

                <div id="quizBody">
                    <h2 id="question"></h2>
                    <div id="answers"></div>
                    <div class="buttons">
                        <button id="prevBtn" onclick="prevQuestion()">⬅ Quay lại</button>
                        <button id="nextBtn" onclick="nextQuestion()">Tiếp theo ➡</button>
                        <button id="submitBtn" onclick="submitQuiz()" style="display:none;">✅ Nộp bài</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
